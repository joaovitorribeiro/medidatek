services:
  mysql:
    image: mysql:8.0
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medidatek}
      MYSQL_USER: ${MYSQL_USER:-medidatek}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-medidatek}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    env_file:
      - ./.env.docker
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-medidatek}
      DB_USERNAME: ${MYSQL_USER:-medidatek}
      DB_PASSWORD: ${MYSQL_PASSWORD:-medidatek}
      SESSION_DRIVER: file
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      RUN_MIGRATIONS: "1"
      RUN_OPTIMIZE: "0"
    volumes:
      - app_storage:/app/storage

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    env_file:
      - ./.env.docker
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-medidatek}
      DB_USERNAME: ${MYSQL_USER:-medidatek}
      DB_PASSWORD: ${MYSQL_PASSWORD:-medidatek}
      SESSION_DRIVER: file
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      RUN_MIGRATIONS: "0"
      RUN_OPTIMIZE: "0"
    volumes:
      - app_storage:/app/storage
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=0"]

volumes:
  app_storage:
  mysql_data:
